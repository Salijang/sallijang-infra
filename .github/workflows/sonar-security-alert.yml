name: Sonar Security Alert

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - ".github/workflows/trivy-iac-scan.yml"

jobs:
  sonar-security-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check secret exists
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          else
            echo "SONAR_TOKEN exists"
          fi

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is missing"
            exit 1
          else
            echo "SLACK_WEBHOOK_URL exists"
          fi

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=salijang
            -Dsonar.projectKey=Salijang_sallijang-infra
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

      - name: Check Security Issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          COUNT=$(curl -s -u "$SONAR_TOKEN:" \
          "https://sonarcloud.io/api/issues/search?componentKeys=Salijang_sallijang-infra&types=VULNERABILITY&severities=BLOCKER,CRITICAL&resolved=false" \
          | jq '.total')

          echo "COUNT=$COUNT" >> $GITHUB_ENV
          echo "High/Critical Security Issues: $COUNT"

      - name: Send Slack Alert
        if: env.COUNT != '0'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\":\"🛡️ SonarQube Security Alert\nRepository: sallijang-infra\nHigh/Critical Security Issues: ${COUNT}건\nhttps://sonarcloud.io/project/overview?id=Salijang_sallijang-infra\"
          }" \
          "$SLACK_WEBHOOK_URL"
