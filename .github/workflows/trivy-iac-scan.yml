name: Trivy IaC Security Scan

on:
  push:
    branches:
      - main
    paths:
      - '**/*.tf'
      - '.github/workflows/trivy-iac-scan.yml'

jobs:
  trivy-iac:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: 1
  
      - name: Send Slack alert on Trivy failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ISSUE=$(grep -m 1 "HIGH:" trivy-results.txt)
      
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\":\"🏗️ *Trivy IaC Security Alert*\n<@U0A5JHMDY49> <@U0A53JU406S>\nRepository: sallijang-*infra*\n${ISSUE}\n확인: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          "$SLACK_WEBHOOK_URL"  //test
